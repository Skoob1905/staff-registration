name: CI + Deploy

on:
  push:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: functions
      - run: npm run lint
      - run: npm run lint
        working-directory: functions
      - run: npm run test
      - run: npm run test
        working-directory: functions
      - run: npm run build
      - run: npm run build
        working-directory: functions

  deploy:
    name: Deploy to Firebase Production
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: w9jds/firebase-action@v13
        with:
          args: deploy --only functions,hosting,firestore:rules,storage:rules --project production
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_PROD }}

  deploy-dev:
    name: Deploy to Firebase Development
    needs: ci
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: w9jds/firebase-action@v13
        with:
          args: deploy --only functions,hosting,firestore:rules,storage:rules --project development
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_DEV }}
